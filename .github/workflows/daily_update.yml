name: Daily PLAVE Update

on:
  schedule:
    - cron: '32 15 * * *'   # AM 12:32 KST (UTC+9)
  workflow_dispatch:         # 수동 실행 허용

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python run.py
        timeout-minutes: 10

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archive/
          git diff --staged --quiet || git commit -m "Daily update: $(date '+%Y-%m-%d')"
          git push

      - name: Send success notification
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os
          from datetime import datetime, timezone, timedelta
          from email.mime.text import MIMEText

          KST = timezone(timedelta(hours=9))
          date_str = datetime.now(KST).strftime("%Y년 %m월 %d일")

          user     = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          body = f"DAILY PLAVE 업데이트가 완료되었습니다.\n\n업데이트 날짜: {date_str}"
          msg = MIMEText(body)
          msg["Subject"] = f"DAILY PLAVE 업데이트 완료 - {date_str}"
          msg["From"]    = user
          msg["To"]      = user

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(user, password)
              server.send_message(msg)

          print(f"이메일 전송 완료: {date_str}")
          PYEOF