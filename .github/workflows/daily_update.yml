name: Daily PLAVE Update

on:
  schedule:
    # 인스티즈(Cloudflare)가 GitHub 러너 IP에 간헐적 403을 주므로,
    # 실패에 대비해 1번 재시도한다. 재시도 실행은 다른 러너 IP를 받아
    # 차단 안 된 IP를 만날 확률이 높아진다. 이미 성공한 날은
    # run.py가 즉시 종료(already_done)하므로 중복 커밋/메일은 없다.
    - cron: '32 15 * * *'   # 00:32 KST (UTC+9)
    - cron: '10 17 * * *'   # 02:10 KST (재시도)
    - cron: '12 18 * * *'   # 03:12 KST (재시도)
    - cron: '24 20 * * *'   # 05:24 KST (재시도)
    - cron: '15 22 * * *'   # 07:15 KST (재시도)
    - cron: '12 0 * * *'    # 09:12 KST (재시도)
    - cron: '1 2 * * *'     # 11:01 KST (재시도)
  workflow_dispatch:         # 수동 실행 허용

# 같은 날 재시도들이 겹쳐 동시에 push 하는 일을 막는다(앞 실행이 끝난 뒤 진행).
concurrency:
  group: daily-plave-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python run.py
        timeout-minutes: 10

      - name: Commit and push results
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archive/ style.css
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "변경 없음 — 커밋/푸시 건너뜀 (이미 처리된 날)"
          else
            git commit -m "Daily update: $(date '+%Y-%m-%d')"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send success notification
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os
          from datetime import datetime, timezone, timedelta
          from email.mime.text import MIMEText

          KST = timezone(timedelta(hours=9))
          date_str = datetime.now(KST).strftime("%Y년 %m월 %d일")

          user     = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          body = f"DAILY PLAVE 업데이트가 완료되었습니다.\n\n업데이트 날짜: {date_str}"
          msg = MIMEText(body)
          msg["Subject"] = f"DAILY PLAVE 업데이트 완료 - {date_str}"
          msg["From"]    = user
          msg["To"]      = user

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(user, password)
              server.send_message(msg)

          print(f"이메일 전송 완료: {date_str}")
          PYEOF